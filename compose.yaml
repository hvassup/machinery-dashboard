services:
  rabbitmq:
    image: 'rabbitmq:4-management'
    hostname: 'rabbitmqserver'
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_DEFAULT_PASS: '${RABBITMQ_PASS:-guest}'
    ports:
      - '5672:5672'
      - '15672:15672'

  postgres:
    image: 'postgres:16'
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-machinery}'
      POSTGRES_USER: '${POSTGRES_USER:-machinery}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-machinery}'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  equipment-01:
    build:
      context: .
      dockerfile: equipment-service/Dockerfile
    restart: unless-stopped
    environment:
      EQUIPMENT_ID: machine-01
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_PASS: '${RABBITMQ_PASS:-guest}'
      ProcessingDelaySeconds: '${MACHINE_0_PROCESSING_SECONDS:-5}'
    depends_on: [rabbitmq]

  equipment-02:
    build:
      context: .
      dockerfile: equipment-service/Dockerfile
    restart: unless-stopped
    environment:
      EQUIPMENT_ID: machine-02
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_PASS: '${RABBITMQ_PASS:-guest}'
      ProcessingDelaySeconds: '${MACHINE_1_PROCESSING_SECONDS:-5}'
    depends_on: [rabbitmq]

  equipment-03:
    build:
      context: .
      dockerfile: equipment-service/Dockerfile
    restart: unless-stopped
    environment:
      EQUIPMENT_ID: machine-03
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_PASS: '${RABBITMQ_PASS:-guest}'
      ProcessingDelaySeconds: '${MACHINE_2_PROCESSING_SECONDS:-5}'
    depends_on: [rabbitmq]

  status-api:
    build:
      context: .
      dockerfile: status-api/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: http://+:8081
      ASPNETCORE_ENVIRONMENT: Production
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_PASS: '${RABBITMQ_PASS:-guest}'
      ConnectionStrings__Default: 'Host=postgres;Database=${POSTGRES_DB:-machinery};Username=${POSTGRES_USER:-machinery};Password=${POSTGRES_PASSWORD:-machinery}'
      Vapid__Subject: '${VAPID_SUBJECT}'
      Vapid__PublicKey: '${VAPID_PUBLIC_KEY}'
      Vapid__PrivateKey: '${VAPID_PRIVATE_KEY}'
      Machines__0__Id: '${MACHINE_0_ID:-machine-01}'
      Machines__0__Name: '${MACHINE_0_NAME:-Machine 01}'
      Machines__1__Id: '${MACHINE_1_ID:-machine-02}'
      Machines__1__Name: '${MACHINE_1_NAME:-Machine 02}'
      Machines__2__Id: '${MACHINE_2_ID:-machine-03}'
      Machines__2__Name: '${MACHINE_2_NAME:-Machine 03}'
    depends_on: [rabbitmq, postgres]

volumes:
  postgres-data:
